name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize, closed]

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/furevercare-api
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/furevercare-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.tag.outputs.tag }}
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Determine deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            echo "app_name=furevercare-pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
            echo "image_tag=pr-${PR_NUM}" >> "$GITHUB_OUTPUT"
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
            echo "uat_url=https://furevercare-pr-${PR_NUM}.gulatilabs.me" >> "$GITHUB_OUTPUT"
          else
            echo "app_name=furevercare" >> "$GITHUB_OUTPUT"
            echo "image_tag=latest" >> "$GITHUB_OUTPUT"
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy production to EC2
        if: steps.target.outputs.is_pr == 'false'
        run: |
          COMPOSE_CONTENT=$(base64 -w 0 deploy/docker-compose.prod.yml)

          CLAUDE_KEY_B64=$(echo -n '${{ secrets.CLAUDE_API_KEY }}' | base64 -w 0)
          STRIPE_KEY_B64=$(echo -n '${{ secrets.STRIPE_SECRET_KEY }}' | base64 -w 0)
          STRIPE_WEBHOOK_B64=$(echo -n '${{ secrets.STRIPE_WEBHOOK_SECRET }}' | base64 -w 0)
          AWS_KEY_B64=$(echo -n '${{ secrets.AWS_ACCESS_KEY_ID }}' | base64 -w 0)
          AWS_SECRET_B64=$(echo -n '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | base64 -w 0)
          S3_BUCKET_B64=$(echo -n '${{ secrets.S3_BUCKET }}' | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"sudo mkdir -p /srv/furevercare\",
              \"echo '$COMPOSE_CONTENT' | base64 -d | sudo tee /srv/furevercare/docker-compose.prod.yml > /dev/null\",
              \"CLAUDE_KEY=\$(echo '$CLAUDE_KEY_B64' | base64 -d) && grep -q '^CLAUDE_API_KEY=' /srv/furevercare/.env 2>/dev/null && sudo sed -i \\\"s/^CLAUDE_API_KEY=.*/CLAUDE_API_KEY=\$CLAUDE_KEY/\\\" /srv/furevercare/.env || echo \\\"CLAUDE_API_KEY=\$CLAUDE_KEY\\\" | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"STRIPE_KEY=\$(echo '$STRIPE_KEY_B64' | base64 -d) && grep -q '^STRIPE_SECRET_KEY=' /srv/furevercare/.env 2>/dev/null && sudo sed -i \\\"s/^STRIPE_SECRET_KEY=.*/STRIPE_SECRET_KEY=\$STRIPE_KEY/\\\" /srv/furevercare/.env || echo \\\"STRIPE_SECRET_KEY=\$STRIPE_KEY\\\" | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"STRIPE_WEBHOOK=\$(echo '$STRIPE_WEBHOOK_B64' | base64 -d) && grep -q '^STRIPE_WEBHOOK_SECRET=' /srv/furevercare/.env 2>/dev/null && sudo sed -i \\\"s/^STRIPE_WEBHOOK_SECRET=.*/STRIPE_WEBHOOK_SECRET=\$STRIPE_WEBHOOK/\\\" /srv/furevercare/.env || echo \\\"STRIPE_WEBHOOK_SECRET=\$STRIPE_WEBHOOK\\\" | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"grep -q '^STORAGE_PROVIDER=' /srv/furevercare/.env 2>/dev/null && sudo sed -i 's/^STORAGE_PROVIDER=.*/STORAGE_PROVIDER=s3/' /srv/furevercare/.env || echo 'STORAGE_PROVIDER=s3' | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"S3_BUCKET_VAL=\$(echo '$S3_BUCKET_B64' | base64 -d) && grep -q '^S3_BUCKET=' /srv/furevercare/.env 2>/dev/null && sudo sed -i \\\"s/^S3_BUCKET=.*/S3_BUCKET=\$S3_BUCKET_VAL/\\\" /srv/furevercare/.env || echo \\\"S3_BUCKET=\$S3_BUCKET_VAL\\\" | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"grep -q '^AWS_REGION=' /srv/furevercare/.env 2>/dev/null && sudo sed -i 's/^AWS_REGION=.*/AWS_REGION=us-east-1/' /srv/furevercare/.env || echo 'AWS_REGION=us-east-1' | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"AWS_KEY_VAL=\$(echo '$AWS_KEY_B64' | base64 -d) && grep -q '^AWS_ACCESS_KEY_ID=' /srv/furevercare/.env 2>/dev/null && sudo sed -i \\\"s/^AWS_ACCESS_KEY_ID=.*/AWS_ACCESS_KEY_ID=\$AWS_KEY_VAL/\\\" /srv/furevercare/.env || echo \\\"AWS_ACCESS_KEY_ID=\$AWS_KEY_VAL\\\" | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"AWS_SECRET_VAL=\$(echo '$AWS_SECRET_B64' | base64 -d) && grep -q '^AWS_SECRET_ACCESS_KEY=' /srv/furevercare/.env 2>/dev/null && sudo sed -i \\\"s|^AWS_SECRET_ACCESS_KEY=.*|AWS_SECRET_ACCESS_KEY=\$AWS_SECRET_VAL|\\\" /srv/furevercare/.env || echo \\\"AWS_SECRET_ACCESS_KEY=\$AWS_SECRET_VAL\\\" | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"grep -q '^EMAIL_PROVIDER=' /srv/furevercare/.env 2>/dev/null && sudo sed -i 's/^EMAIL_PROVIDER=.*/EMAIL_PROVIDER=ses/' /srv/furevercare/.env || echo 'EMAIL_PROVIDER=ses' | sudo tee -a /srv/furevercare/.env > /dev/null\",
              \"cd /srv/furevercare\",
              \"echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin\",
              \"docker compose -f docker-compose.prod.yml pull\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:owners || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:pdf-import || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:weight-units || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:sex-fixed || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:password-reset || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:share-tokens || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:image-import || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:document-import || true\",
              \"docker compose -f docker-compose.prod.yml run --rm backend npm run db:migrate:image-metadata || true\",
              \"docker compose -f docker-compose.prod.yml up -d\",
              \"docker image prune -f\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          echo "Command ID: $COMMAND_ID"

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            echo "Waiting for deployment... ($STATUS)"
            sleep 10
          done
          echo "Deployment timed out"
          exit 1

      - name: Deploy PR environment to EC2
        if: steps.target.outputs.is_pr == 'true'
        run: |
          APP_NAME="${{ steps.target.outputs.app_name }}"
          IMAGE_TAG="${{ steps.target.outputs.image_tag }}"

          # PR environments reuse production postgres/redis but run their own API + frontend
          COMPOSE=$(cat <<'COMPOSEOF'
          services:
            backend:
              image: ghcr.io/gulati8/furevercare-api:IMAGE_TAG_PLACEHOLDER
              container_name: APP_NAME_PLACEHOLDER-api
              environment:
                NODE_ENV: production
                PORT: 3001
                DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@furevercare-db:5432/${POSTGRES_DB}
                REDIS_URL: redis://furevercare-redis:6379
                JWT_SECRET: ${JWT_SECRET}
                FRONTEND_URL: https://APP_NAME_PLACEHOLDER.gulatilabs.me
                CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
                STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
                STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
                STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
                S3_BUCKET: ${S3_BUCKET:-}
                AWS_REGION: ${AWS_REGION:-us-east-1}
                AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
                AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
                EMAIL_PROVIDER: ${EMAIL_PROVIDER:-ses}
              restart: unless-stopped
              networks:
                - proxy
                - furevercare_internal

            frontend:
              image: ghcr.io/gulati8/furevercare-web:IMAGE_TAG_PLACEHOLDER
              container_name: APP_NAME_PLACEHOLDER-web
              depends_on:
                - backend
              restart: unless-stopped
              networks:
                - proxy

          networks:
            proxy:
              external: true
            furevercare_internal:
              external: true
          COMPOSEOF
          )

          COMPOSE=$(echo "$COMPOSE" | sed "s/IMAGE_TAG_PLACEHOLDER/${IMAGE_TAG}/g" | sed "s/APP_NAME_PLACEHOLDER/${APP_NAME}/g")
          COMPOSE_B64=$(echo "$COMPOSE" | base64 -w 0)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"mkdir -p /srv/${APP_NAME}\",
              \"cp /srv/furevercare/.env /srv/${APP_NAME}/.env 2>/dev/null || true\",
              \"echo '${COMPOSE_B64}' | base64 -d > /srv/${APP_NAME}/docker-compose.yml\",
              \"echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u gulati8 --password-stdin\",
              \"cd /srv/${APP_NAME} && docker compose pull && docker compose up -d --remove-orphans\",
              \"cp /srv/proxy/Caddyfile /srv/proxy/Caddyfile.bak\",
              \"grep -q '${APP_NAME}.gulatilabs.me' /srv/proxy/Caddyfile 2>/dev/null || printf '\\\\n${APP_NAME}.gulatilabs.me {\\\\n  handle /api/* {\\\\n    reverse_proxy ${APP_NAME}-api:3001\\\\n  }\\\\n  handle /uploads/* {\\\\n    reverse_proxy ${APP_NAME}-api:3001\\\\n  }\\\\n  handle {\\\\n    reverse_proxy ${APP_NAME}-web:80\\\\n  }\\\\n}\\\\n' >> /srv/proxy/Caddyfile\",
              \"docker exec proxy-caddy-1 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 || { echo 'Caddyfile validation failed, restoring backup'; cp /srv/proxy/Caddyfile.bak /srv/proxy/Caddyfile; exit 1; }\",
              \"cd /srv/proxy && docker compose restart caddy\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          for i in {1..30}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "PR environment deployed!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "PR deploy failed!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' \
                --output text
              exit 1
            fi
            echo "Waiting for PR deployment... ($STATUS)"
            sleep 10
          done
          echo "PR deployment timed out"
          exit 1

      - name: Notify Slack of UAT deployment
        if: steps.target.outputs.is_pr == 'true'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --json body -q .body \
            --repo "${{ github.repository }}")

          CHANNEL=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_channel=\([^ <]*\).*/\1/p')
          THREAD=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_thread_ts=\([^ <]*\).*/\1/p')

          if [ -n "$CHANNEL" ] && [ -n "$THREAD" ]; then
            UAT_URL="${{ steps.target.outputs.uat_url }}"
            PR_URL="https://github.com/${{ github.repository }}/pull/${{ github.event.pull_request.number }}"

            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-type: application/json" \
              -d "{
                \"channel\": \"${CHANNEL}\",
                \"thread_ts\": \"${THREAD}\",
                \"text\": \"UAT deployed and ready for review:\\n${UAT_URL}\\n\\nPR: ${PR_URL}\"
              }"
          else
            echo "No Slack metadata found in PR body — skipping notification"
          fi

  cleanup-pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Remove PR environment
        run: |
          APP_NAME="furevercare-pr-${{ github.event.pull_request.number }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"cd /srv/${APP_NAME} && docker compose down --remove-orphans 2>/dev/null || true\",
              \"rm -rf /srv/${APP_NAME}\",
              \"cp /srv/proxy/Caddyfile /srv/proxy/Caddyfile.bak\",
              \"awk -v block='${APP_NAME}.gulatilabs.me' 'BEGIN{skip=0; depth=0} \\$0 ~ block {skip=1; depth=0} skip{depth+=gsub(/{/,\\\"{\\\"); depth-=gsub(/}/,\\\"}\\\"); if(depth<=0){skip=0; next}} !skip' /srv/proxy/Caddyfile.bak > /srv/proxy/Caddyfile\",
              \"docker exec proxy-caddy-1 caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1 || { echo 'Caddyfile validation failed, restoring backup'; cp /srv/proxy/Caddyfile.bak /srv/proxy/Caddyfile; exit 1; }\",
              \"cd /srv/proxy && docker compose restart caddy\"
            ]" \
            --query 'Command.CommandId' \
            --output text)

          for i in {1..15}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "PR environment cleaned up!"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Cleanup failed (non-critical)"
              exit 0
            fi
            echo "Waiting for cleanup... ($STATUS)"
            sleep 5
          done

      - name: Notify Slack of cleanup
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(gh pr view ${{ github.event.pull_request.number }} \
            --json body -q .body \
            --repo "${{ github.repository }}" 2>/dev/null || true)

          CHANNEL=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_channel=\([^ <]*\).*/\1/p')
          THREAD=$(echo "$PR_BODY" | sed -n 's/.*commanddeck:slack_thread_ts=\([^ <]*\).*/\1/p')

          MERGED="${{ github.event.pull_request.merged }}"
          if [ "$MERGED" = "true" ]; then
            MSG="PR merged and deployed to production. UAT environment cleaned up."
          else
            MSG="PR closed. UAT environment cleaned up."
          fi

          if [ -n "$CHANNEL" ] && [ -n "$THREAD" ]; then
            curl -s -X POST https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-type: application/json" \
              -d "{
                \"channel\": \"${CHANNEL}\",
                \"thread_ts\": \"${THREAD}\",
                \"text\": \"${MSG}\"
              }"
          fi
